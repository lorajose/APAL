        <section class="card wiz-card intro-card wiz-text-body">

            <dl class="summary-list wiz-review-fact-list">
                <template for:each={basicsSummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">
                        <dt class="wiz-review-label">{row.label}</dt>
                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>
            </dl>
        </section>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Presenting &amp; Availability</h3>

            </div>
            <dl class="summary-list wiz-review-fact-list">
                <template for:each={presentingSummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">

                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">

            <dl class="summary-list wiz-review-fact-list">
                <template for:each={priorSummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">

                        <dd class="wiz-review-value">{row.value}</dd>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">

                <h3 class="wiz-item-title">Safety — Suicide</h3>

                <template for:each={suicideSummary} for:item="row">

                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>
            </dl>
        </section>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Safety — Homicide / Violence</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="5" onclick={handleEditStep}>Edit Homicide Risk</button>

            <dl class="summary-list wiz-review-fact-list">
                <template for:each={homicideSummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">
                        <dt class="wiz-review-label">{row.label}</dt>
                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Psychosis, Mania &amp; Red Flags</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="6" onclick={handleEditStep}>Edit Psychosis/Mania</button>
            </div>
            <dl class="summary-list wiz-review-fact-list">
                <template for:each={psychosisSummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">
                        <dt class="wiz-review-label">{row.label}</dt>
                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>
            </dl>
        </section>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Family &amp; Trauma</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="7" onclick={handleEditStep}>Edit Family/Trauma</button>
            </div>
            <dl class="summary-list wiz-review-fact-list">
                <template for:each={familySummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">
                        <dt class="wiz-review-label">{row.label}</dt>
                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>
            </dl>
        </section>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Home Safety, Stressors &amp; Supports</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="8" onclick={handleEditStep}>Edit Home Safety</button>
            </div>
            <dl class="summary-list wiz-review-fact-list">
                <template for:each={homeSafetySummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">
                        <dt class="wiz-review-label">{row.label}</dt>
                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>
            </dl>
        </section>

        <section class="card wiz-card summary-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Orientation &amp; Cognition</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="9" onclick={handleEditStep}>Edit Cognition</button>
            </div>
            <dl class="summary-list wiz-review-fact-list">
                <template for:each={cognitionSummary} for:item="row">
                    <div key={row.label} class="summary-row wiz-review-fact">
                        <dt class="wiz-review-label">{row.label}</dt>
                        <dd class="wiz-review-value">{row.value}</dd>
                    </div>
                </template>
            </dl>
        </section>

        <section class="card wiz-card grid-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Concerns</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="13" onclick={handleEditStep}>Edit Concerns</button>
            </div>
            <template if:true={concerns.length}>
                <div class="grid-list wiz-review-list wiz-review-grid">
                    <template for:each={concerns} for:item="concern">
                        <article key={concern.id} class="grid-item wiz-selected-row wiz-review-grid-item">
                            <header class="wiz-heading-stack">
                                <h4>{concern.label}</h4>
                                <p>{concern.category}</p>
                            </header>
                            <p class="grid-notes wiz-review-copy">
                                Source:
                                <span>
                                    <template if:true={concern.sourceLabel}>{concern.sourceLabel}</template>
                                    <template if:false={concern.sourceLabel}>Manual</template>
                                </span>
                            </p>
                            <p class="grid-notes wiz-review-copy">
                                Notes:
                                <span>
                                    <template if:true={concern.notes}>{concern.notes}</template>
                                    <template if:false={concern.notes}>—</template>
                                </span>
                            </p>
                        </article>
                    </template>
                </div>
            </template>
            <template if:false={concerns.length}>
                <p class="empty-subtitle wiz-empty-state-subtitle">No concerns captured.</p>
            </template>
        </section>

        <section class="card wiz-card grid-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Medications</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="10" onclick={handleEditStep}>Edit Medications</button>
            </div>
            <template if:true={medications.length}>
                <div class="grid-list wiz-review-list wiz-review-grid">
                    <template for:each={medications} for:item="med">
                        <article key={med.id} class="grid-item wiz-selected-row wiz-review-grid-item">
                            <header class="wiz-heading-stack">
                                <h4>{med.meta.title}</h4>
                                <p>{med.meta.brand}</p>
                            </header>
                            <div class="pill-row wiz-panel-meta">
                                <span class="summary-pill wiz-pill">
                                    <template if:true={med.action}>{med.action}</template>
                                    <template if:false={med.action}>—</template>
                                </span>
                                <template if:true={med.frequency}>
                                    <span class="summary-pill wiz-pill">{med.frequency}</span>
                                </template>
                                <template if:true={med.amount}>
                                    <span class="summary-pill wiz-pill">{med.amount} {med.unit}</span>
                                </template>
                                <span class="summary-pill wiz-pill">{med.meta.category}</span>
                                <template if:true={med.current}>
                                    <span class="summary-pill positive wiz-pill is-success">Current</span>
                                </template>
                                <template if:true={med.allergy}>
                                    <span class="summary-pill warning wiz-pill is-warning">Allergy</span>
                                </template>
                            </div>
                            <p class="grid-notes wiz-review-copy">
                                Notes:
                                <span>
                                    <template if:true={med.notes}>{med.notes}</template>
                                    <template if:false={med.notes}>—</template>
                                </span>
                            </p>
                        </article>
                    </template>
                </div>
            </template>
            <template if:false={medications.length}>
                <p class="empty-subtitle wiz-empty-state-subtitle">No medications captured.</p>
            </template>
        </section>

        <section class="card wiz-card grid-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Substances</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="11" onclick={handleEditStep}>Edit Substances</button>
            </div>
            <template if:true={substances.length}>
                <div class="grid-list wiz-review-list wiz-review-grid">
                    <template for:each={substances} for:item="item">
                        <article key={item.id} class="grid-item wiz-selected-row wiz-review-grid-item">
                            <header class="wiz-heading-stack">
                                <h4>{item.meta.name}</h4>
                            </header>
                            <div class="pill-row wiz-panel-meta">
                                <template if:true={item.frequency}>
                                    <span class="summary-pill wiz-pill">{item.frequency}</span>
                                </template>
                                <template if:true={item.current}>
                                    <span class="summary-pill positive wiz-pill is-success">Current</span>
                                </template>
                            </div>

                                <span>
                                    <template if:true={item.notes}>{item.notes}</template>

            </template>
        </section>

        <section class="card wiz-card grid-card wiz-review-panel wiz-summary-card">

                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="12" onclick={handleEditStep}>Edit Screeners</button>
            </div>
            <template if:true={screeners.length}>
                <div class="grid-list wiz-review-list wiz-review-grid">
                    <template for:each={screeners} for:item="scr">
                        <article key={scr.id} class="grid-item wiz-selected-row wiz-review-grid-item">
                            <header class="wiz-heading-stack">
                                <h4>{scr.meta.name}</h4>
                                <p>{scr.meta.type}</p>
                            </header>
                            <div class="pill-row wiz-panel-meta">
                                <template if:true={scr.date}>
                                    <span class="summary-pill wiz-pill">{scr.date}</span>
                                </template>
                                <template if:true={scr.score}>
                                    <span class="summary-pill wiz-pill">Score: {scr.score}</span>
                                </template>
                                <template if:true={scr.positive}>
                                    <span class="summary-pill positive wiz-pill is-success">Positive</span>
                                </template>
                            </div>
                            <p class="grid-notes wiz-review-copy">
                                Notes:
                                <span>
                                    <template if:true={scr.notes}>{scr.notes}</template>
                                    <template if:false={scr.notes}>—</template>
                                </span>
                            </p>
                        </article>
                    </template>
                </div>
            </template>
            <template if:false={screeners.length}>
                <p class="empty-subtitle wiz-empty-state-subtitle">No screeners captured.</p>
            </template>
        </section>

        <section class="card wiz-card grid-card wiz-review-panel wiz-summary-card">
            <div class="summary-header wiz-panel-header wiz-review-section-header">
                <h3 class="wiz-item-title">Safety Risks</h3>
                <button class="link-button wiz-btn wiz-btn-text" type="button" data-step="14" onclick={handleEditStep}>Edit Safety Risks</button>

                            <div class="pill-row wiz-panel-meta">

                                    <template if:true={risk.recent}>Yes</template>
                                    <template if:false={risk.recent}>No</template>
                                </span>

            </template>
        </section>
        </template>

        <div class="slds-grid slds-grid_align-spread slds-var-m-top_large wiz-step-footer">
            <button class="slds-button btn-back wiz-btn wiz-btn-footer-back" type="button" onclick={handleBack}>Back</button>
            <button class="slds-button btn-next wiz-btn wiz-btn-footer-next" type="button" onclick={handleFinish} disabled={finishDisabled}>{primaryLabel}</button>
        </div>
    </div>
