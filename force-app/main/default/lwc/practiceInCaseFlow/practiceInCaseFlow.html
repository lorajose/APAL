<template>
  <lightning-layout multiple-rows>
    <lightning-layout-item size="12" class="slds-p-bottom_none">
      <div class="practice-search-shell">
        <c-practice-search-input
          selected-practice-id={practiceId}
          practice-record={practiceRecord}
          is-from-flow={isFromFlow}
          onpracticeselected={handleValueChange}
          onclearselection={handleClearSelection}
        >
        </c-practice-search-input>
        <template if:true={showSuggestedPracticeHelper}>
          <div class="practice-helper practice-helper--overlay">
            <div class="practice-helper__bubble" role="status">
              Verify this is the correct practice
            </div>
          </div>
        </template>
      </div>
    </lightning-layout-item>

    <lightning-layout-item size="12" padding="medium">
      <c-flow-button-modal
        label="New Practice"
        variant="brand"
        flow-api-name="New_Practice"
        finish-action={finishAction}
      >
      </c-flow-button-modal>
    </lightning-layout-item>
  </lightning-layout>
</template>
