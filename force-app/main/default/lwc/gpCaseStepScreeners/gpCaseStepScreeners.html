<template>
    <div class="step-section wiz-step-stack">
        <div class="section-header wiz-subflow-header">
            <div class="section-heading wiz-subflow-heading">
                <template if:true={isGridView}>
                    <template if:true={showFilters}>
                        <h2 class="wiz-section-title">
                            <lightning-icon icon-name={headerIconName} size="small" class="heading-icon wiz-heading-icon"></lightning-icon>
                            {headerTitle}
                        </h2>
                    </template>
                </template>
                <template if:true={isWizardView}>
                    <div class="wizard-heading wiz-heading-stack">
                        <h3 class="wiz-subflow-title">Screeners</h3>
                       <!-- <p class="wizard-subcopy">Compact. Step 1: choose. Step 2: enter details. Step 3: review.</p>
                        <div class="wizard-inline-progress">
                            <span class={wizardInlineDotPick}></span>
                            <span class={wizardInlineDotDetails}></span>
                            <span class={wizardInlineDotReview}></span>
                            <span class="wizard-inline-label">Pick → Details → Review</span>
                        </div> -->
                    </div>
                </template>
            </div>
            <template if:true={isWizardView}>
                <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={cancelWizard}>Cancel</button>
            </template>
        </div>

        <template if:true={isGridView}>
            <template if:true={hasScreeners}>
                <section class="card wiz-card grid-controls">
                    <div class="grid-header-row wiz-collection-header">
                        <template if:false={showFilters}>
                            <div class="grid-title wiz-collection-title">
                                <lightning-icon icon-name={headerIconName} size="small" class="heading-icon wiz-heading-icon"></lightning-icon>
                                <span class="grid-title-text wiz-subflow-title wiz-collection-title-text">{headerTitle}</span>
                            </div>
                        </template>
                        <template if:true={showFilters}>
                            <div class="control-group wiz-control-group">
                                <label class="input-label wiz-field-label" for="grid-filter">Filter by</label>
                                <select id="grid-filter" class="text-input wiz-control" value={filterBy} onchange={handleFilterChange}>
                                    <template for:each={filterOptions} for:item="option">
                                        <option key={option.value} value={option.value}>{option.label}</option>
                                    </template>
                                </select>
                            </div>
                            <div class="control-group wiz-control-group">
                                <label class="input-label wiz-field-label" for="grid-search">Search</label>
                                <input id="grid-search" class="text-input wiz-control" type="search" placeholder="Filter by name..." value={searchValue} oninput={handleSearchChange} />
                            </div>
                        </template>
                        <div class="grid-actions wiz-collection-actions wiz-grid-actions">
                        <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={toggleShowNotes}>
                            <template if:true={showAllNotes}>Hide notes</template>
                            <template if:false={showAllNotes}>Show notes</template>
                        </button>
                            <template if:true={showAddButton}>
                                <template if:true={hasScreeners}>
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleEditScreenersWizard}>Edit</button>
                                </template>
                                <button class="primary-button wiz-btn wiz-btn-primary" type="button" onclick={handleAddScreeners}>Add Screeners</button>
                            </template>
                        </div>
                    </div>
                    <div class="scr-grid wiz-collection-grid">
                        <template for:each={filteredScreeners} for:item="scr">
                            <article key={scr.id} class={scr.cardClass}>
                                <header class="scr-card-header">
                                    <div>
                                        <h3>{scr.meta.name}</h3>
                                        <span class="scr-category-pill">{scr.meta.type}</span>
                                    </div>
                                </header>
                                <div class="pill-row wiz-panel-meta">
                                    <span class="summary-pill wiz-pill">{scr.meta.type}</span>
                                    <template if:true={scr.date}>
                                        <span class="summary-pill wiz-pill">{scr.date}</span>
                                    </template>
                                    <template if:true={scr.score}>
                                        <span class="summary-pill wiz-pill">{scr.score}</span>
                                    </template>
                                    <template if:true={scr.positive}>
                                        <span class="summary-pill positive wiz-pill is-success">Positive</span>
                                    </template>
                                    <template if:true={showScreenerId}>
                                        <template if:true={scr.recordName}>
                                            <span class="summary-pill link-pill wiz-pill">
                                                <span class="scr-label">Screener Reference Number:</span>
                                                <template if:true={scr.recordLink}>
                                                    <a class="scr-id-value" href={scr.recordLink} target="_blank">{scr.recordName}</a>
                                                </template>
                                                <template if:false={scr.recordLink}>
                                                    <span class="scr-id-value">{scr.recordName}</span>
                                                </template>
                                            </span>
                                        </template>
                                    </template>
                                </div>
                                <template if:true={showAllNotes}>
                                    <div class="field field-full wiz-field">
                                        <label class="input-label wiz-field-label">Notes</label>
                                        <textarea class="textarea wiz-control wiz-textarea" data-id={scr.id} data-field="notes" aria-label="Screener notes" oninput={handleCardNoteChange} disabled={readOnlyNotes}>{scr.notes}</textarea>
                                    </div>
                                </template>
                                <template if:false={showAllNotes}>
                                    <p class="scr-notes">
                                        <template if:true={scr.notes}>
                                            {scr.previewNotes}
                                        </template>
                                        <template if:false={scr.notes}>
                                            —
                                        </template>
                                    </p>
                                </template>
                                <div class="card-actions wiz-action-row-end">
                                    <template if:true={showNavigation}>
                                     <!--   <button class="pill-button" data-id={scr.id} onclick={handleEditScreener}>Edit</button> -->
                                    </template>
                                    <button class="pill-button danger wiz-btn wiz-btn-pill-danger" type="button" data-id={scr.id} onclick={handleRemoveScreener}>Remove</button>
                                </div>
                                <template if:true={scr.showConfirm}>
                                    <div class="remove-confirm wiz-confirm-panel">
                                        <p class="wiz-confirm-copy">Remove this screener?</p>
                                        <div class="remove-actions wiz-action-row">
                                            <button class="pill-button danger wiz-btn wiz-btn-pill-danger" type="button" data-id={scr.id} onclick={confirmRemove}>Confirm Remove</button>
                                            <button class="pill-button secondary wiz-btn wiz-btn-secondary" type="button" onclick={cancelRemove}>Cancel</button>
                                        </div>
                                    </div>
                                </template>
                            </article>
                        </template>
                    </div>
                </section>
            </template>
            <template if:false={hasScreeners}>
                <section class="card empty-state-card wiz-empty-panel">
                    <template if:false={showFilters}>
                        <div class="wiz-empty-state-body">
                            <div class="grid-title wiz-collection-title">
                                <lightning-icon icon-name={headerIconName} size="small" class="heading-icon wiz-heading-icon"></lightning-icon>
                                <span class="grid-title-text wiz-subflow-title wiz-collection-title-text">{headerTitle}</span>
                            </div>
                        </div>
                    </template>
                    <!--<div>
                        <p class="empty-title">No screeners captured yet</p>
                        <p class="empty-subtitle">Use the button to add items manually.</p>
                    </div> -->
                    <div class="wiz-empty-state-actions">
                        <button class="primary-button wiz-btn wiz-btn-primary" type="button" onclick={handleAddScreeners}>Add Screeners</button>
                    </div>
                </section>
            </template>
        </template>

        <template if:true={isWizardView}>
            <section class="card wiz-card wizard-shell wiz-subflow-shell">
              <!--  <div class="wizard-progress">
                    <span class={wizardStep >= 0 ? 'dot active' : 'dot'}></span>
                    <span class={wizardStep >= 1 ? 'dot active' : 'dot'}></span>
                    <span class={wizardStep >= 2 ? 'dot active' : 'dot'}></span>
                    <span class="wizard-label">{wizardStepLabel}</span> 
                </div> -->

                <template if:true={wizardStepIsPick}>
                    <div class="wizard-controls wiz-collection-header">
                        <div class="control-group wiz-control-group">
                            <label class="input-label wiz-field-label" for="wizard-filter">Filter by</label>
                            <select id="wizard-filter" class="text-input wiz-control" value={wizardFilter} onchange={handleWizardFilterChange}>
                                <option value="name">Name</option>
                                <option value="type">Type</option>
                                <option value="notes">Notes</option>
                            </select>
                        </div>
                        <div class="control-group wiz-control-group">
                            <label class="input-label wiz-field-label" for="wizard-search">Search</label>
                            <input id="wizard-search" class="text-input wiz-control" type="search" placeholder="Filter by name..." value={wizardSearch} oninput={handleWizardSearchChange} />
                        </div>
                    </div>
                    <div class="wizard-result-row wiz-result-row">
                        <span class="result-pill wiz-pill">{wizardResultCount} result(s)</span>
                        <div class="result-actions wiz-collection-actions">
                            <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleSelectAllFiltered}>Select all (filtered)</button>
                            <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleClearSelection}>Clear</button>
                        </div>
                    </div>
                    <div class="wizard-catalog wiz-catalog-grid">
                        <template for:each={wizardCatalogItems} for:item="item">
                            <label key={item.id} class={item.className}>
                                <input
                                    type="checkbox"
                                    data-id={item.id}
                                    checked={item.checked}
                                    disabled={item.disabled}
                                    onchange={handleWizardSelectionToggle}
                                />
                                <div class="catalog-details wiz-catalog-details">
                                    <p class="catalog-title wiz-item-title">{item.name}</p>
                                    <p class="catalog-brand wiz-text-secondary">{item.type}</p>
                                    <p class="catalog-description wiz-description">{item.positiveOutcome}</p>
                                    <template if:true={item.disabled}>
                                        <span class="catalog-added">Added</span>
                                    </template>
                                </div>
                            </label>
                        </template>
                    </div>
                </template>

                <template if:true={wizardStepIsDetails}>
                    <template for:each={wizardDraft} for:item="item">
                        <section key={item.id} class="detail-card wiz-detail-panel wiz-detail-card-shell">
                            <header class="detail-header wiz-panel-header wiz-detail-header">
                                <div>
                                    <h3 class="wiz-item-title">{item.meta.name}</h3>
                                    <p class="detail-brand wiz-detail-brand wiz-text-secondary">{item.meta.type}</p>
                                </div>
                                <button class="text-button wiz-btn wiz-btn-text" type="button" data-id={item.id} onclick={handleWizardRemoveDraft}>Remove</button>
                            </header>
                            <div class="detail-grid wiz-detail-grid">
                                <div class="field wiz-field">
                                    <label class="input-label wiz-field-label">Approximate Date</label>
                                    <input type="date" class="text-input wiz-control wiz-date-control" data-id={item.id} data-field="date" value={item.date} aria-label="Screener approximate date" onchange={handleWizardDetailChange} />
                                </div>
                                <div class="field wiz-field">
                                    <label class="input-label wiz-field-label">Score</label>
                                    <input type="text" class="text-input wiz-control" data-id={item.id} data-field="score" value={item.score} aria-label="Screener score" oninput={handleWizardDetailChange} />
                                </div>
                                <label class="checkbox-field wiz-checkbox-row success">
                                    <input type="checkbox" data-id={item.id} data-field="positive" checked={item.positive} onchange={handleWizardDetailChange} />
                                    <span>Positive outcome?</span>
                                </label>
                            </div>
                            <div class="field field-full wiz-detail-notes wiz-field">
                                <label class="input-label wiz-field-label">Notes</label>
                                <textarea class="textarea wiz-control wiz-textarea wiz-detail-notes-input" data-id={item.id} data-field="notes" aria-label="Screener notes" oninput={handleWizardDetailChange}>{item.notes}</textarea>
                            </div>
                        </section>
                    </template>
                </template>

                <template if:true={wizardStepIsReview}>
                    <div class="review-panel wiz-review-panel">
                        <h3 class="wiz-subflow-title">Review</h3>
                        <div class="review-list wiz-review-list">
                            <template for:each={wizardDraft} for:item="item">
                                <article key={item.id} class="review-entry wiz-review-entry">
                                    <div class="review-heading">
                                        <div>
                                            <h4 class="wiz-item-title">{item.meta.name}</h4>
                                            <p class="review-subtitle wiz-review-entry-subtitle wiz-text-secondary">{item.meta.type}</p>
                                        </div>
                                    </div>
                                    <p class="review-line wiz-review-entry-line wiz-text-body">
                                        Date:
                                        <template if:true={item.date}>
                                            {item.date}
                                        </template>
                                        <template if:false={item.date}>
                                            --
                                        </template>
                                        <template if:true={item.score}>
                                            | Score: {item.score}
                                        </template>
                                        <template if:true={item.positive}>
                                            | Positive outcome
                                        </template>
                                    </p>
                                    <p class="review-notes wiz-review-entry-notes wiz-text-body">
                                        <span>Notes:</span>
                                        <span>
                                            <template if:true={item.notes}>
                                                {item.notes}
                                            </template>
                                            <template if:false={item.notes}>
                                                —
                                            </template>
                                        </span>
                                    </p>
                                </article>
                            </template>
                        </div>
                    </div>
                </template>

                <div class="wizard-footer wiz-subflow-footer">
                   <!-- <button class="ghost-button" onclick={wizardBack} disabled={wizardBackDisabled}>Back</button> -->
                    <div class="wizard-actions wiz-subflow-actions">
                        <template if:true={wizardStepIsReview}>
                            <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleReviewEditDetails}>Edit Details</button>
                            <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleReviewChangeSelection}>Change Selection</button>
                        </template>
                        <template if:false={wizardStepIsReview}>
                            <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={cancelWizard}>Cancel</button>
                        </template>
                        <button class="primary-button wiz-btn wiz-btn-primary" type="button" onclick={wizardNext} disabled={wizardNextDisabled}>
                            <template if:true={wizardStepIsReview}>Save</template>
                            <template if:false={wizardStepIsReview}>Next</template>
                        </button>
                    </div>
                </div>
            </section>
        </template>

        <template if:true={showNavigation}>
            <div class="slds-grid slds-grid_align-spread slds-var-m-top_large wiz-step-footer">
                <button class="slds-button btn-back wiz-btn wiz-btn-footer-back" type="button" onclick={handleBack}>Back</button>
                <button class="slds-button btn-next wiz-btn wiz-btn-footer-next" type="button" onclick={handleNext}>Next</button>
            </div>
        </template>
    </div>
</template>
