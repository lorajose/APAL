<template>
    <div class="step-section wiz-step-stack">
       <!-- <div class="section-header">
            <h2>Step 6 — Psychosis, Mania &amp; Red Flags</h2>
            <p>Capture symptom clusters and note any medical contributors.</p>
        </div> -->

        <section class="card wiz-card multi-grid">
            <div class="multi-column">
                <header class="card-header wiz-card-header">
                    <div class="wiz-heading-stack">
                        <p class="card-title wiz-item-title">Psychosis Symptoms</p>
                        <p class="card-subtitle wiz-description">Search or tap to toggle key psychosis indicators.</p>
                    </div>
                    <span class="selected-counter wiz-counter">{psychosisCountLabel}</span>
                </header>
                <div class="input-row wiz-search-row">
                    <label class="input-label wiz-field-label" for="psychosis-search">Search</label>
                    <input id="psychosis-search" type="search" class="pill-search wiz-pill-search" placeholder="Filter options..."
                        value={psychosisSearch} oninput={handlePsychosisSearch}>
                </div>
                <div class="chip-grid wiz-chip-grid">
                    <template for:each={psychosisFilteredOptions} for:item="option">
                        <button key={option.value} type="button" class={option.chipClass} data-value={option.value}
                            onclick={handlePsychosisToggle}>
                            {option.label}
                        </button>
                    </template>
                </div>
            </div>

            <div class="multi-column">
                <header class="card-header wiz-card-header">
                    <div class="wiz-heading-stack">
                        <p class="card-title wiz-item-title">Mania / Hypomania Symptoms</p>
                        <p class="card-subtitle wiz-description">Capture mania/hypomania presentations observed.</p>
                    </div>
                    <span class="selected-counter wiz-counter">{maniaCountLabel}</span>
                </header>
                <div class="input-row wiz-search-row">
                    <label class="input-label wiz-field-label" for="mania-search">Search</label>
                    <input id="mania-search" type="search" class="pill-search wiz-pill-search" placeholder="Filter options..."
                        value={maniaSearch} oninput={handleManiaSearch}>
                </div>
                <div class="chip-grid wiz-chip-grid">
                    <template for:each={maniaFilteredOptions} for:item="option">
                        <button key={option.value} type="button" class={option.chipClass} data-value={option.value}
                            onclick={handleManiaToggle}>
                            {option.label}
                        </button>
                    </template>
                </div>
            </div>
        </section>

        <section class="card wiz-card">
            <div class="field field-full wiz-field wiz-detail-notes">
                <label class="input-label wiz-field-label" for="psychosis-notes">Other Psychosis &amp; Mania Notes</label>
                <lightning-textarea
                    id="psychosis-notes"
                    label="Other Psychosis &amp; Mania Notes"
                    variant="label-hidden"
                    class="lightning-textarea notes-lightning-textarea wiz-lightning-textarea"
                    placeholder="Document context, quotes, or caregiver observations."
                    value={psychosisNotes}
                    onchange={handlePsychosisNotesChange}>
                </lightning-textarea>
                <p class="helper-text wiz-field-helper">Document context, quotes, or caregiver observations.</p>
            </div>
        </section>

        <section class="card wiz-card">
            <header class="card-header wiz-card-header">
                <div class="wiz-heading-stack">
                    <p class="card-title wiz-item-title">Medical Red Flags</p>
                    <p class="card-subtitle wiz-description">Flag any contributing medical drivers that require parallel workup.</p>
                </div>
                <span class="selected-counter wiz-counter">{redFlagCountLabel}</span>
            </header>
            <div class="input-row wiz-search-row">
                <label class="input-label wiz-field-label" for="red-flag-search">Search</label>
                <input id="red-flag-search" type="search" class="pill-search wiz-pill-search" placeholder="Filter options..."
                    value={redFlagSearch} oninput={handleRedFlagSearch}>
            </div>
            <div class="chip-grid wiz-chip-grid">
                <template for:each={redFlagFilteredOptions} for:item="option">
                    <button key={option.value} type="button" class={option.chipClass} data-value={option.value}
                        onclick={handleRedFlagToggle}>
                        {option.label}
                    </button>
                </template>
            </div>
        </section>

        <section class="card wiz-card">
            <div class="field field-full wiz-field wiz-detail-notes">
                <label class="input-label wiz-field-label" for="red-flag-notes">Red Flag Notes</label>
                <textarea id="red-flag-notes" class="textarea wiz-control"
                    placeholder="See medical red flag selections."
                    oninput={handleRedFlagNotesChange}>{redFlagNotes}</textarea>
                <p class="helper-text wiz-field-helper">Add lab requests, escalation plans, or coordination details.</p>
            </div>
        </section>

        <div class="slds-grid slds-grid_align-spread slds-var-m-top_large wiz-step-footer">
            <button class="slds-button btn-back wiz-btn wiz-btn-footer-back" type="button" onclick={handleBack}>Back</button>
            <button class="slds-button btn-next wiz-btn wiz-btn-footer-next" type="button" onclick={handleNext}>Next</button>
        </div>
    </div>
</template>
