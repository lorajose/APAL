<template>
    <div class="step-section">
       <!-- <div class="section-header">
            <h2>Step 9 — Orientation &amp; Cognition</h2>
            <p>Capture orientation status and cognition notes when needed.</p>
        </div> -->

        <section class="card wiz-field">
            <label class="input-label wiz-field-label" for="orientation"><span class="required wiz-required">*</span>Orientation</label>
            <select
                id="orientation"
                class="text-input wiz-control"
                onchange={handleOrientationChange}
            >
                <option value="">—</option>
                <template for:each={orientationOptions} for:item="option">
                    <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                </template>
            </select>
            <template if:true={orientationError}>
                <p class="error-text wiz-field-error wiz-inline-error">{orientationError}</p>
            </template>
        </section>

        <template if:true={showCognitionNotes}>
            <section class="card">
                <div class="field field-full wiz-field">
                    <label class="input-label wiz-field-label" for="cognition-notes"><span class="required wiz-required">*</span>Cognition Notes</label>
                    <textarea
                        id="cognition-notes"
                        class="textarea wiz-control"
                        placeholder="Describe memory, processing, reorientation cues..."
                        oninput={handleNotesChange}
                    >{cognitionNotes}</textarea>
                    <p class="helper-text wiz-field-helper">Describe memory, processing, reorientation cues...</p>
                </div>
                <template if:true={cognitionNotesError}>
                    <p class="error-text wiz-field-error wiz-inline-error">{cognitionNotesError}</p>
                </template>
            </section>
        </template>

        <div class="slds-grid slds-grid_align-spread slds-var-m-top_large wiz-step-footer">
            <button class="slds-button btn-back wiz-btn wiz-btn-footer-back" type="button" onclick={handleBack}>Back</button>
            <button class="slds-button btn-next wiz-btn wiz-btn-footer-next" type="button" onclick={handleNext}>Next</button>
        </div>
    </div>
</template>
