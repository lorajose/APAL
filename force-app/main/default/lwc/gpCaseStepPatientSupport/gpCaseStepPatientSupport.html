<template>
    <template if:true={shouldRender}>
        <div class="step-section wiz-step-stack">
            <div class="section-header wiz-subflow-header">
                <div class="section-heading wiz-subflow-heading">
                    <template if:true={showFilters}>
                        <h2 class="wiz-section-title">
                            <lightning-icon icon-name={headerIconName} size="small" class="heading-icon wiz-heading-icon"></lightning-icon>
                            {headerTitle}
                        </h2>
                    </template>
                    <template if:true={isWizardView}>
                    <div class="wizard-heading wiz-heading-stack">
                        <h3 class="wiz-subflow-title">Supports</h3>
                       <!-- <p class="wizard-subcopy">Compact. Step 1: choose. Step 2: enter details. Step 3: review.</p>
                        <div class="wizard-inline-progress">
                            <span class={wizardInlineDotPick}></span>
                            <span class={wizardInlineDotDetails}></span>
                            <span class={wizardInlineDotReview}></span>
                            <span class="wizard-inline-label">Pick → Details → Review</span>
                        </div> -->
                    </div>
                </template>
                </div>
                <template if:true={isReadOnlySurface}>
                    <template if:true={showShowMoreToggle}>
                        <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={toggleShowMore}>
                            <template if:true={showAllCards}>Show less</template>
                            <template if:false={showAllCards}>Show more</template>
                        </button>
                    </template>
                </template>
                <template if:true={isWizardView}>
                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={cancelWizard}>Cancel</button>
                </template>
            </div>

            <template if:true={isReadOnlySurface}>
                <template if:true={hasSupports}>
                    <div class="scr-grid wiz-collection-grid">
                        <template for:each={visibleSupports} for:item="sup">
                            <article key={sup.id} class="scr-card">
                                <header class="scr-card-header">
                                    <div>
                                        <h3 class="wiz-item-title">{sup.supportName}</h3>
                                    </div>
                                </header>
                                <div class="pill-row wiz-panel-meta">
                                    <template if:true={sup.scheduled}>
                                        <span class="summary-pill wiz-pill">Scheduled</span>
                                    </template>
                                    <template if:true={sup.going}>
                                        <span class="summary-pill wiz-pill">Going</span>
                                    </template>
                                    <template if:true={sup.appointmentCompleted}>
                                        <span class="summary-pill wiz-pill">Appt Completed</span>
                                    </template>
                                    <template if:true={sup.appointmentCompletedIneffective}>
                                        <span class="summary-pill wiz-pill">Completed (Ineffective)</span>
                                    </template>
                                    <template if:true={sup.suspended}>
                                        <span class="summary-pill wiz-pill">Suspended</span>
                                    </template>
                                    <template if:true={sup.careNotApplicable}>
                                        <span class="summary-pill wiz-pill">Care Not Applicable</span>
                                    </template>
                                </div>
                                <p class="scr-notes wiz-text-body">
                                    <template if:true={sup.notes}>
                                        {sup.previewNotes}
                                    </template>
                                    <template if:false={sup.notes}>
                                        —
                                    </template>
                                </p>
                            </article>
                        </template>
                    </div>
                </template>
            </template>

            <template if:false={isReadOnlySurface}>
                <template if:true={isGridView}>
                    <template if:true={showGridControls}>
                        <section class="card wiz-card grid-controls">
                            <div class="grid-header-row wiz-collection-header">
                                <template if:false={showFilters}>
                                    <div class="grid-title wiz-collection-title">
                                        <lightning-icon icon-name={headerIconName} size="small" class="heading-icon wiz-heading-icon"></lightning-icon>
                                        <span class="grid-title-text wiz-subflow-title wiz-collection-title-text">{headerTitle}</span>
                                    </div>
                                </template>
                                <template if:true={showFilters}>
                                    <div class="control-group wiz-control-group">
                                        <label class="input-label wiz-field-label" for="grid-filter">Filter by</label>
                                        <select id="grid-filter" class="text-input wiz-control" onchange={handleFilterChange}>
                                            <template for:each={filterOptionsDecorated} for:item="option">
                                                <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                                            </template>
                                        </select>
                                    </div>
                                    <div class="control-group wiz-control-group">
                                        <label class="input-label wiz-field-label" for="grid-search">Search</label>
                                        <input id="grid-search" class="text-input wiz-control" type="search" placeholder="Filter by name..." value={searchValue} oninput={handleSearchChange} />
                                    </div>
                                </template>
                                <div class="grid-actions wiz-collection-actions wiz-grid-actions">
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={toggleShowNotes}>
                                        <template if:true={showAllNotes}>Hide notes</template>
                                        <template if:false={showAllNotes}>Show notes</template>
                                    </button>
                                    <template if:true={showAddButton}>
                                        <template if:true={hasSupports}>
                                            <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleEditSupportWizard}>Edit</button>
                                        </template>
                                        <button class="primary-button wiz-btn wiz-btn-primary" type="button" onclick={handleAddSupport}>Add Supports</button>
                                    </template>
                                </div>
                            </div>
                            <div class="scr-grid wiz-collection-grid">
                                <template for:each={filteredSupports} for:item="sup">
                                    <article key={sup.id} class={sup.cardClass}>
                                        <header class="scr-card-header">
                                            <div>
                                                <h3 class="wiz-item-title">{sup.supportName}</h3>
                                                <template if:true={showSupportId}>
                                                    <p class="support-id">
                                                        <span class="support-label">Support Id:</span>
                                                        <template if:true={sup.recordLink}>
                                                            <a class="support-id-value" href={sup.recordLink} target="_blank">{sup.recordName}</a>
                                                        </template>
                                                        <template if:false={sup.recordLink}>
                                                            <span class="support-id-value">{sup.recordName}</span>
                                                        </template>
                                                    </p>
                                                </template>
                                            </div>
                                        </header>
                                        <div class="pill-row wiz-panel-meta">
                                            <template if:true={sup.scheduled}>
                                                <span class="summary-pill wiz-pill">Scheduled</span>
                                            </template>
                                            <template if:true={sup.going}>
                                                <span class="summary-pill wiz-pill">Going</span>
                                            </template>
                                            <template if:true={sup.appointmentCompleted}>
                                                <span class="summary-pill wiz-pill">Appt Completed</span>
                                            </template>
                                            <template if:true={sup.appointmentCompletedIneffective}>
                                                <span class="summary-pill wiz-pill">Completed (Ineffective)</span>
                                            </template>
                                            <template if:true={sup.suspended}>
                                                <span class="summary-pill wiz-pill">Suspended</span>
                                            </template>
                                            <template if:true={sup.careNotApplicable}>
                                                <span class="summary-pill wiz-pill">Care Not Applicable</span>
                                            </template>
                                        </div>
                                        <template if:true={showAllNotes}>
                                            <div class="field field-full wiz-field">
                                                <label class="input-label wiz-field-label">Notes</label>
                                                <textarea class="textarea wiz-control wiz-textarea" data-id={sup.id} data-field="notes" aria-label="Support notes" oninput={handleCardNoteChange} disabled={isStandaloneLayout} readonly={isStandaloneLayout}>{sup.notes}</textarea>
                                            </div>
                                        </template>
                                        <template if:false={showAllNotes}>
                                            <p class="scr-notes wiz-text-body">
                                                <template if:true={sup.notes}>
                                                    {sup.previewNotes}
                                                </template>
                                                <template if:false={sup.notes}>
                                                    —
                                                </template>
                                            </p>
                                        </template>
                                        <div class="support-flags">
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={sup.id} data-field="scheduled" checked={sup.scheduled} disabled />
                                                <span class="input-label wiz-field-label">Scheduled</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={sup.id} data-field="going" checked={sup.going} disabled />
                                                <span class="input-label wiz-field-label">Going</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={sup.id} data-field="appointmentCompleted" checked={sup.appointmentCompleted} disabled />
                                                <span class="input-label wiz-field-label">Appointment Completed</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={sup.id} data-field="appointmentCompletedIneffective" checked={sup.appointmentCompletedIneffective} disabled />
                                                <span class="input-label wiz-field-label">Completed (Ineffective)</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={sup.id} data-field="suspended" checked={sup.suspended} disabled />
                                                <span class="input-label wiz-field-label">Suspended</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={sup.id} data-field="careNotApplicable" checked={sup.careNotApplicable} disabled />
                                                <span class="input-label wiz-field-label">Care Not Applicable</span>
                                            </label>
                                        </div>
                                        <template if:true={canEditSupports}>
                                            <div class="card-actions wiz-action-row-end">
                                                <template if:true={showNavigation}>
                                                  <!--  <button class="pill-button" data-id={sup.id} onclick={handleEditSupport}>Edit</button> -->
                                                </template>
                                                <button class="pill-button danger wiz-btn wiz-btn-pill-danger" type="button" data-id={sup.id} onclick={handleRemoveSupport}>Remove</button>
                                            </div>
                                            <template if:true={sup.showConfirm}>
                                                <div class="remove-confirm wiz-confirm-panel">
                                                    <p class="wiz-confirm-copy">Remove this support?</p>
                                                    <div class="remove-actions wiz-action-row">
                                                        <button class="pill-button danger wiz-btn wiz-btn-pill-danger" type="button" data-id={sup.id} onclick={confirmRemove}>Confirm Remove</button>
                                                        <button class="pill-button secondary wiz-btn wiz-btn-secondary" type="button" onclick={cancelRemove}>Cancel</button>
                                                    </div>
                                                </div>
                                            </template>
                                        </template>
                                    </article>
                                </template>
                            </div>
                        </section>
                    </template>
                    <template if:false={hasSupports}>
                        <section class="card empty-state-card wiz-empty-panel">
                            <template if:false={showFilters}>
                                <div class="wiz-empty-state-body">
                                    <div class="grid-title wiz-collection-title">
                                        <lightning-icon icon-name={headerIconName} size="small" class="heading-icon wiz-heading-icon"></lightning-icon>
                                        <span class="grid-title-text wiz-subflow-title wiz-collection-title-text">{headerTitle}</span>
                                    </div>
                                </div>
                            </template>
                            <!--<div>
                                <p class="empty-title">No supports captured yet</p>
                                <template if:false={hideEmptySubtitle}>
                                    <p class="empty-subtitle">Use the button to add items manually.</p>
                                </template>
                            </div> -->
                            <template if:true={showAddButton}>
                                <div class="wiz-empty-state-actions">
                                    <button class="primary-button wiz-btn wiz-btn-primary" type="button" onclick={handleAddSupport}>Add Supports</button>
                                </div>
                            </template>
                        </section>
                    </template>
                </template>

                <template if:true={isWizardView}>
                    <section class="card wiz-card wizard-shell wiz-subflow-shell">
                        <template if:true={wizardStepIsPick}>
                            <div class="wizard-controls wiz-collection-header">
                                <div class="control-group wiz-control-group">
                                    <label class="input-label wiz-field-label" for="wizard-filter">Filter by</label>
                                    <select id="wizard-filter" class="text-input wiz-control" onchange={handleWizardFilterChange}>
                                        <template for:each={wizardFilterOptionsDecorated} for:item="option">
                                            <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                                        </template>
                                    </select>
                                </div>
                                <div class="control-group wiz-control-group">
                                    <label class="input-label wiz-field-label" for="wizard-search">Search</label>
                                    <input id="wizard-search" class="text-input wiz-control" type="search" placeholder="Filter by name..." value={wizardSearch} oninput={handleWizardSearchChange} />
                                </div>
                            </div>
                            <div class="wizard-result-row wiz-result-row">
                                <span class="result-pill wiz-pill">{wizardResultCount} result(s)</span>
                                <div class="result-actions wiz-collection-actions">
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleSelectAllFiltered}>Select all (filtered)</button>
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleClearSelection}>Clear</button>
                                </div>
                            </div>
                            <div class="wizard-catalog wiz-catalog-grid">
                                <template for:each={wizardCatalogItems} for:item="item">
                                    <label key={item.id} class={item.className}>
                                        <input
                                            type="checkbox"
                                            data-id={item.id}
                                            checked={item.checked}
                                            disabled={item.disabled}
                                            onchange={handleWizardSelectionToggle}
                                        />
                                        <div class="catalog-details wiz-catalog-details">
                                            <p class="catalog-title wiz-item-title">{item.name}</p>
                                            <template if:true={item.disabled}>
                                                <span class="catalog-added">Added</span>
                                            </template>
                                        </div>
                                    </label>
                                </template>
                            </div>
                        </template>

                        <template if:true={wizardStepIsDetails}>
                            <template for:each={wizardDraft} for:item="item">
                                <section key={item.id} class="detail-card wiz-detail-panel wiz-detail-card-shell">
                                    <header class="detail-header wiz-panel-header wiz-detail-header">
                                        <div>
                                            <h3 class="wiz-item-title">{item.meta.name}</h3>
                                        </div>
                                        <button class="text-button wiz-btn wiz-btn-text" type="button" data-id={item.id} onclick={handleWizardRemoveDraft}>Remove</button>
                                    </header>
                                    <div class="detail-fields">
                                        <div class="detail-checkboxes">
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={item.id} data-field="scheduled" checked={item.scheduled} onchange={handleWizardDetailChange} />
                                                <span class="input-label wiz-field-label">Scheduled</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={item.id} data-field="going" checked={item.going} onchange={handleWizardDetailChange} />
                                                <span class="input-label wiz-field-label">Going</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={item.id} data-field="appointmentCompleted" checked={item.appointmentCompleted} onchange={handleWizardDetailChange} />
                                                <span class="input-label wiz-field-label">Appointment Completed</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={item.id} data-field="appointmentCompletedIneffective" checked={item.appointmentCompletedIneffective} onchange={handleWizardDetailChange} />
                                                <span class="input-label wiz-field-label">Completed (Ineffective)</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={item.id} data-field="suspended" checked={item.suspended} onchange={handleWizardDetailChange} />
                                                <span class="input-label wiz-field-label">Suspended</span>
                                            </label>
                                            <label class="flag-item wiz-checkbox-row">
                                                <input type="checkbox" data-id={item.id} data-field="careNotApplicable" checked={item.careNotApplicable} onchange={handleWizardDetailChange} />
                                                <span class="input-label wiz-field-label">Care Not Applicable</span>
                                            </label>
                                        </div>
                                        <div class="field field-full wiz-field wiz-detail-notes">
                                            <label class="input-label wiz-field-label">Notes</label>
                                            <textarea class="textarea wiz-control wiz-textarea wiz-detail-notes-input" data-id={item.id} data-field="notes" aria-label="Support notes" oninput={handleWizardDetailChange}>{item.notes}</textarea>
                                        </div>
                                    </div>
                                </section>
                            </template>
                        </template>

                        <template if:true={wizardStepIsReview}>
                            <div class="review-panel wiz-review-panel">
                                <h3 class="wiz-subflow-title">Review</h3>
                                <div class="review-list wiz-review-list">
                                    <template for:each={wizardDraft} for:item="item">
                                        <article key={item.id} class="review-entry wiz-review-entry">
                                            <div class="review-heading">
                                                <div>
                                                    <h4 class="wiz-item-title">{item.meta.name}</h4>
                                                </div>
                                            </div>
                                            <div class="pill-row wiz-panel-meta">
                                                <template if:true={item.scheduled}>
                                                    <span class="summary-pill wiz-pill">Scheduled</span>
                                                </template>
                                                <template if:true={item.going}>
                                                    <span class="summary-pill wiz-pill">Going</span>
                                                </template>
                                                <template if:true={item.appointmentCompleted}>
                                                    <span class="summary-pill wiz-pill">Appt Completed</span>
                                                </template>
                                                <template if:true={item.appointmentCompletedIneffective}>
                                                    <span class="summary-pill wiz-pill">Completed (Ineffective)</span>
                                                </template>
                                                <template if:true={item.suspended}>
                                                    <span class="summary-pill wiz-pill">Suspended</span>
                                                </template>
                                                <template if:true={item.careNotApplicable}>
                                                    <span class="summary-pill wiz-pill">Care Not Applicable</span>
                                                </template>
                                            </div>
                                            <p class="review-notes wiz-review-entry-notes wiz-text-body">
                                                <span>Notes:</span>
                                                <span>
                                                    <template if:true={item.notes}>
                                                        {item.notes}
                                                    </template>
                                                    <template if:false={item.notes}>
                                                        —
                                                    </template>
                                                </span>
                                            </p>
                                        </article>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <div class="wizard-footer wiz-subflow-footer">
                            <div class="wizard-actions wiz-subflow-actions">
                                <template if:true={wizardStepIsReview}>
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleReviewEditDetails}>Edit Details</button>
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={handleReviewChangeSelection}>Change Selection</button>
                                </template>
                                <template if:false={wizardStepIsReview}>
                                    <button class="ghost-button wiz-btn wiz-btn-ghost" type="button" onclick={cancelWizard}>Cancel</button>
                                </template>
                                <button class="primary-button wiz-btn wiz-btn-primary" type="button" onclick={wizardNext} disabled={wizardNextDisabled}>
                                    <template if:true={wizardStepIsReview}>Save</template>
                                    <template if:false={wizardStepIsReview}>Next</template>
                                </button>
                            </div>
                        </div>
                    </section>
                </template>
            </template>
        </div>
    </template>
</template>
